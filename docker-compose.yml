services:
  backend:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  backend-data:
  caddy-data:
  caddy-config:
