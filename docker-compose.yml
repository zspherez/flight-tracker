services:
  backend:
    image: ghcr.io/zspherez/flight-tracker/backend:latest
    build: ./backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - backend-data:/app/data
      # Firebase service-account JSON. Materialized by the deploy workflow
      # from secrets on the VM; placed in ./certs/ locally for dev.
      - ./certs:/app/certs:ro

  frontend:
    image: ghcr.io/zspherez/flight-tracker/frontend:latest
    build: ./frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  backend-data:
  caddy-data:
  caddy-config:
